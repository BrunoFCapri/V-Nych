version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chaja_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chaja_mesh
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chaja_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  backend:
    container_name: ChajaMesh
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/chaja_mesh
      REDIS_URL: redis://redis:6379/
      RUST_LOG: debug
    depends_on:
      - db
      - redis
